apiVersion: v1
data:
  config.yml: |
    # ===========================================
    # Frigate NVR Configuration — k3master homelab
    # ===========================================

    # --- MQTT ---
    # Frigate publishes detection events here.
    # Reusing the existing Mosquitto broker in the hydroflow namespace.
    # Why cluster DNS? Because the pod runs in a different namespace (frigate),
    # but K8s DNS lets any pod reach any service via <svc>.<ns>.svc.cluster.local
    mqtt:
      host: mosquitto.hydroflow.svc.cluster.local
      port: 1883

    # --- go2rtc ---
    # Handles RTSP intake and restreaming. Each camera gets a main + sub stream.
    # Frigate never decodes the main stream for detection — only the sub stream.
    # The main stream is passed through (no re-encode) to recordings when triggered.
    go2rtc:
      streams:
        # XMeye cameras (.11-.16) — NETSurveillance protocol
        cam11:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=0.sdp
        cam11_sub:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=1.sdp
        cam12:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=0.sdp
        cam12_sub:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=1.sdp
        cam13:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=0.sdp
        cam13_sub:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=1.sdp
        cam14:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=0.sdp
        cam14_sub:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=1.sdp
        cam15:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=0.sdp
        cam15_sub:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=1.sdp
        cam16:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=0.sdp
        cam16_sub:
          - rtsp://admin:@192.168.X.X:554/user=admin&password=&channel=1&stream=1.sdp

        # Reolink (.17) — 4K main (H.265), sub (H.264). TCP required.
        cam17:
          - rtsp://admin:{FRIGATE_REOLINK_PASSWORD}@192.168.X.X:554/h264Preview_01_main
        cam17_sub:
          - rtsp://admin:{FRIGATE_REOLINK_PASSWORD}@192.168.X.X:554/h264Preview_01_sub
        # cam17_detect removed — go2rtc transcode too CPU-heavy

        # Xiaomi Yi (.19) — yi-hack firmware, no auth
        cam19:
          - rtsp://192.168.X.X:554/ch0_0.h264
        cam19_sub:
          - rtsp://192.168.X.X:554/ch0_1.h264

    # --- FFmpeg Hardware Acceleration ---
    # NVIDIA NVDEC on GTX 1050Ti (Pascal). preset-nvidia covers H.264 + H.265.
    ffmpeg:
      hwaccel_args: preset-nvidia

    # --- Detection ---
    # TensorRT via ONNX runtime, GTX 1050Ti.
    detectors:
      onnx:
        type: onnx

    model:
      path: /config/model_cache/yolov9s.onnx
      input_tensor: nchw
      input_pixel_format: rgb
      input_dtype: float
      width: 320
      height: 320
      model_type: yolo-generic
      labelmap_path: /labelmap/coco-80.txt

    # --- Face Recognition ---
    # Built-in Frigate 0.17 feature. Uses person detection snapshots
    # to identify known faces. Faces are stored in /config/clips/faces.
    # Only enabled on cam17_reolink (4K — best resolution for face matching).
    face_recognition:
      enabled: true
      model_size: small
      min_area: 1500
      detection_threshold: 0.4

    # --- Camera Defaults ---
    # Applied to all cameras unless overridden per-camera.
    # This keeps the config DRY — Don't Repeat Yourself.
    objects:
      track:
        - person
      filters:
        person:
          min_score: 0.5
          threshold: 0.7

    record:
      enabled: true
      # Frigate 0.15 splits recording into categories:
      #   continuous — always recording (we don't want this)
      #   motion — record on motion (less specific)
      #   alerts — record when tracked object triggers alert zone
      #   detections — record when a tracked object (person) is detected
      continuous:
        days: 0              # no 24/7 recording — saves disk
      motion:
        days: 0              # no motion-only recording
      detections:
        pre_capture: 5       # record 5s BEFORE person detected
        post_capture: 10     # record 10s AFTER person leaves
        retain:
          days: 90           # keep detection clips for 90 days
          mode: motion       # retain motion segments within the event

    snapshots:
      enabled: true
      retain:
        default: 90          # keep snapshots 90 days

    # --- Cameras ---
    cameras:
      # ---- XMeye cameras (NETSurveillance) ----
      cam11:
        enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/cam11        # main via go2rtc (720p)
              roles: [record]
            - path: rtsp://127.0.0.1:8554/cam11_sub    # sub via go2rtc (640x480)
              roles: [detect]
        detect:
          enabled: true
          width: 640
          height: 480
          fps: 5
        onvif:
          host: 192.168.X.X
          port: 8899
          user: admin
          password: ''

        motion:
          threshold: 40
          contour_area: 30
          improve_contrast: true
      cam12:
        enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/cam12
              roles: [record]
            - path: rtsp://127.0.0.1:8554/cam12_sub
              roles: [detect]
        detect:
          enabled: true
          width: 640
          height: 480
          fps: 5
        onvif:
          host: 192.168.X.X
          port: 8899
          user: admin
          password: ''

      cam13:
        enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/cam13
              roles: [record]
            - path: rtsp://127.0.0.1:8554/cam13_sub
              roles: [detect]
        detect:
          enabled: true
          width: 640
          height: 480
          fps: 5
        onvif:
          host: 192.168.X.X
          port: 8899
          user: admin
          password: ''

      cam14:
        enabled: false       # offline — enable when camera is back
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/cam14
              roles: [record]
            - path: rtsp://127.0.0.1:8554/cam14_sub
              roles: [detect]
        detect:
          enabled: true
          width: 640
          height: 480
          fps: 5
        onvif:
          host: 192.168.X.X
          port: 8899
          user: admin
          password: ''

      cam15:
        enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/cam15
              roles: [record]
            - path: rtsp://127.0.0.1:8554/cam15_sub
              roles: [detect]
        detect:
          enabled: true
          width: 640
          height: 480
          fps: 5
        onvif:
          host: 192.168.X.X
          port: 8899
          user: admin
          password: ''

      cam16:
        enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/cam16
              roles: [record]
            - path: rtsp://127.0.0.1:8554/cam16_sub
              roles: [detect]
        detect:
          enabled: true
          width: 640
          height: 480
          fps: 5
        onvif:
          host: 192.168.X.X
          port: 8899
          user: admin
          password: ''

      # ---- Reolink (4K, TCP only, face recognition enabled) ----
      # ---- Reolink (4K Main Stream forced for Detection) ----
      cam17_reolink:
        enabled: true
        ffmpeg:
          hwaccel_args: preset-nvidia                  # NVDEC H.264/H.265
          inputs:
            - path: rtsp://127.0.0.1:8554/cam17        # 4K at 25 FPS
              input_args: -rtsp_transport tcp
              roles:
                - record
                - detect                               # AI runs on the main stream
        detect:
          enabled: true
          width: 1280                                  # Downscale 4K to 720p via QSV
          height: 720
          fps: 5                                       # Frigate will drop 20 frames and analyze 5 per second
        objects:
          track:
            - person
        snapshots:
          enabled: true
        onvif:
          host: 192.168.X.X
          port: 8000

      # ---- Xiaomi Yi (yi-hack) ----
        motion:
          mask: 0.035,0.281,0,0.264,0,0.011,0.02,0.005
      cam19_yicam:
        enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/cam19
              roles: [record]
            - path: rtsp://127.0.0.1:8554/cam19_sub
              roles: [detect]
        detect:
          enabled: true
          width: 640
          height: 480
          fps: 5
        # Yi cameras via yi-hack don't support ONVIF — no PTZ control
        motion:
          threshold: 40        # default 25 — higher = less sensitive, reduces IR noise & insect triggers
          contour_area: 20     # default 10 — ignore tiny motion blobs (bugs, IR flicker)
          improve_contrast: false  # disabled — at night this amplifies grain/noise, not useful
        objects:
          track:
            - person
          filters:
            person:
              min_score: 0.65  # global default 0.5 — require higher confidence before tracking
              threshold: 0.80  # global default 0.7 — require higher sustained confidence for alert
              min_area: 4000   # ignore tiny person-shaped blobs from IR artifacts
    version: 0.17-0
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: frigate
